name: Publish to npm

on:
  push:
    tags:
      - '*/v*'   # e.g. claude-code/v1.2.3 or sdk/v2.0.0

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Resolve package from tag
        id: pkg
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_DIR="${TAG%/v*}"
          echo "dir=$PKG_DIR" >> $GITHUB_OUTPUT

      - name: Install and build
        run: |
          cd ${{ steps.pkg.outputs.dir }}
          npm install
          npm run build

      - name: Publish
        run: |
          cd ${{ steps.pkg.outputs.dir }}
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
